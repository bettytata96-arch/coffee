<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Coffee Shop</title>
    <link rel="stylesheet" href="styleB.css">
</head>
<body>

<header>
    <nav class="navbar section-content">
        <a href="index.html" class="nav-logo">
            <h2 class="logo-text">☕️ Coffee</h2>
        </a>
        <ul class="nav-menu">
            <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
            <li class="nav-item"><a href="gallery.html" class="nav-link">Gallery</a></li>
            <li class="nav-item"><a href="review.html" class="nav-link">Reviews</a></li>
        </ul>
    </nav>
</header>

<main>
<section class="auth-section">
    <div class="auth-box">

        <!-- LOGIN FORM -->
        <div id="loginBox">
            <h2 class="section-title" style="padding-bottom: 30px;">Login</h2>
            <form id="loginForm" class="auth-form">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p class="auth-switch">Don't have an account? <a href="#" id="showRegister">Register here</a></p>
        </div>

        <!-- REGISTER FORM (hidden by default) -->
        <div id="registerBox" style="display:none;">
            <h2 class="section-title" style="padding-bottom: 30px;">Create Account</h2>
            <form id="registerForm" class="auth-form">
                <input type="text" id="registerName" placeholder="Full Name" required>
                <input type="email" id="registerEmail" placeholder="Email" required>
                <input type="password" id="registerPassword" placeholder="Password (min 6 characters)" required minlength="6">
                <button type="submit">Register</button>
            </form>
            <p class="auth-switch">Already have an account? <a href="#" id="showLogin">Login here</a></p>
        </div>

    </div>
</section>
</main>

<footer class="footer-section">
    <div class="section-content">
        <p class="copyrighy-text">@2025 coffee</p>
    </div>
</footer>

<script src="auth.js"></script>
<script>
    const API_BASE = 'http://localhost:5000/api';

    document.getElementById('showRegister').addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('registerBox').style.display = 'block';
    });
    document.getElementById('showLogin').addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('registerBox').style.display = 'none';
        document.getElementById('loginBox').style.display = 'block';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;

        try {
            const res = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();

            if (!res.ok) {
                alert(data.error || 'Login failed');
                return;
            }

            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = 'index.html';
        } catch (err) {
            alert('Something went wrong logging in.');
            console.error(err);
        }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('registerName').value.trim();
        const email = document.getElementById('registerEmail').value.trim();
        const password = document.getElementById('registerPassword').value;

        try {
            const res = await fetch(`${API_BASE}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            const data = await res.json();

            if (!res.ok) {
                alert(data.error || 'Registration failed');
                return;
            }

            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = 'index.html';
        } catch (err) {
            alert('Something went wrong registering.');
            console.error(err);
        }
    });
</script>
</body>
</html>
